{% extends "tienda/base.html" %}

{% block content %}
<div class="container">
    <h2>Clientes</h2>

    <a href="{% url 'tienda:crear_cliente' %}" class="btn btn-success">
        + Nuevo Cliente
    </a>

    <div class="grid">
        {% for cliente in clientes %}
        <div class="card">
            <h3>{{ cliente.nombre }}</h3>
            <p>{{ cliente.correo }}</p>
            <p>Activo: {{ cliente.activo }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
