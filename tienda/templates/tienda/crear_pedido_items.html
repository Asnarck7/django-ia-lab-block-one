{% extends "tienda/base.html" %}

{% block title %}Crear Pedido{% endblock %}

{% block content %}

<div class="container">
    <h2>🧾 Crear Pedido</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- 👤 FORM PRINCIPAL (Pedido) -->
        <div class="card">
            <h4>Datos del Pedido</h4>
            {{ pedido_form.as_p }}
        </div>

        <hr>

        <!-- 🛍 FORMSET (PRODUCTOS) -->
        <div class="card">
            <h4>Productos del Pedido</h4>

            {{ formset.management_form }}

            {% for form in formset %}
                <div class="producto-linea">
                    {{ form.as_p }}
                </div>
            {% endfor %}
        </div>

        <br>

        <button type="submit" class="btn btn-primary">
            💾 Guardar Pedido
        </button>
    </form>
</div>

{% endblock %}
