{% extends 'tienda/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">

        <div class="col-md-6">
            <div class="card p-4">

                <h2>{{ producto.nombre }}</h2>
                <p class="text-muted">{{ producto.descripcion }}</p>
                <h3 class="text-success mt-3">${{ producto.precio }}</h3>

                <div class="mt-4 d-flex gap-2">
                    <a href="{% url 'tienda:editar_producto' producto.pk %}" class="btn btn-warning">✏️ Editar</a>

                    <a href="{% url 'tienda:lista_productos' %}" class="btn btn-secondary">⬅ Volver</a>

                    <a href="{% url 'tienda:eliminar_producto' producto.pk %}" class="btn btn-eliminar">
                        🗑 Eliminar
                    </a>
                </div>

            </div>
        </div>

        <div class="col-md-6 text-center">
            <div class="card p-4">
                {% if producto.imagen %}
                    <img src="{{ producto.imagen.url }}" class="img-fluid rounded">
                {% else %}
                    <img src="https://via.placeholder.com/300" class="img-fluid rounded">
                {% endif %}
            </div>
        </div>

    </div>
</div>
{% endblock %}
